name: Deploy Website to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploying via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql, bcmath, ctype, curl, dom, fileinfo, filter, hash, openssl, pcre, session, tokenizer, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Write production .env
        run: |
          cat > .env <<EOF
          APP_NAME="CRD Performance Deck"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://crd-performance-deck.freehosting.dev

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=database
          CACHE_STORE=database

          MAIL_MAILER=log

          POS_REPORT_CSV_URL="${{ secrets.POS_REPORT_CSV_URL }}"

          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://crd-performance-deck.freehosting.dev/auth/google/callback

          DEPLOY_MIGRATE_TOKEN=${{ secrets.DEPLOY_MIGRATE_TOKEN }}
          EOF

      # InfinityFree's free plan only exposes a single htdocs/ folder (no
      # directory above it to keep vendor/, app/, .env outside the web
      # root), so public/'s contents get merged up to sit alongside them.
      # See deploy/README.md for the full explanation.
      - name: Assemble flattened deploy folder
        run: |
          shopt -s dotglob
          mkdir -p deploy-staging
          cp -r app bootstrap config database resources routes storage vendor artisan composer.json .env deploy-staging/
          rm -f deploy-staging/database/database.sqlite
          cp -r public/* deploy-staging/
          cp deploy/htdocs.htaccess deploy-staging/.htaccess
          mkdir -p deploy-staging/build
          cp deploy/build.htaccess deploy-staging/build/.htaccess
          cp deploy/migrate.php deploy-staging/migrate.php

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy-staging/
          server-dir: htdocs/

      # No SSH on the free tier, so this is the only way to run migrations —
      # a one-time HTTP-triggered script, deleted immediately after. See
      # deploy/migrate.php and deploy/README.md.
      - name: Run migrations
        run: |
          sleep 5
          curl -sf "https://crd-performance-deck.freehosting.dev/migrate.php?token=${{ secrets.DEPLOY_MIGRATE_TOKEN }}"

      - name: Remove one-time migration script
        run: |
          curl -sS -Q "DELE htdocs/migrate.php" "ftp://${{ secrets.FTP_SERVER }}" --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" || true
